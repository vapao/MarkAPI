name: CI

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      ADMIN_PASSWORD: ci-admin-password
      SESSION_SECRET: ci-session-secret
      DATABASE_URL: file:../data/ci.db
      ALLOW_INSECURE_ADMIN_COOKIE: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npm run prisma:generate

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Build Docker image
        run: docker build -t markapi:ci .

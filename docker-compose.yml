services:
  markapi:
    build: .
    ports:
      - "3000:3000"
    environment:
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:?set ADMIN_PASSWORD}
      SESSION_SECRET: ${SESSION_SECRET:?set SESSION_SECRET}
      DATABASE_URL: ${DATABASE_URL:-file:./data/markapi.db}
      ALLOW_HTTP_ADMIN_LOGIN: ${ALLOW_HTTP_ADMIN_LOGIN:-1}
    volumes:
      - markapi-data:/app/data

volumes:
  markapi-data:
